version: '3.9'

services:
  web:
    build: .
    container_name: sentinel-app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=sentinel_db
      - DB_USERNAME=sentinel_user
      - DB_PASSWORD=${DB_PASSWORD:-sentinel_password}
    volumes:
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    depends_on:
      - db
    networks:
      - sentinel-network
      - shared-network
    restart: always

  db:
    image: postgres:16-alpine
    container_name: sentinel-db
    environment:
      - POSTGRES_DB=sentinel_db
      - POSTGRES_USER=sentinel_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-sentinel_password}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - sentinel-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel_user -d sentinel_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:

networks:
  sentinel-network:
    driver: bridge
  shared-network:
    external: true
    name: sentinel-shared-network
